<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2a4a"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1150" cy="500" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="500" r="120" fill="rgba(255,255,255,0.03)"/>
  <!-- Logo mark -->
  <rect x="80" y="80" width="8" height="60" rx="4" fill="#38bdf8"/>
  <rect x="96" y="100" width="8" height="40" rx="4" fill="#38bdf8"/>
  <rect x="112" y="90" width="8" height="50" rx="4" fill="#38bdf8"/>
  <rect x="128" y="70" width="8" height="70" rx="4" fill="#0ea5e9"/>
  <!-- Brand name -->
  <text x="80" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-2">CalcPhi</text>
  <!-- Tagline -->
  <text x="80" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.75)">Free Financial Calculators</text>
  <!-- Separator line -->
  <rect x="80" y="330" width="120" height="4" rx="2" fill="#38bdf8"/>
  <!-- Description -->
  <text x="80" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="rgba(255,255,255,0.65)">India · USA · Canada · Australia</text>
  <!-- Bottom trust bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="603" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">SIP · EMI · PPF · Income Tax · Mortgage · 401k · Compound Interest</text>
  <!-- URL -->
  <text x="1120" y="603" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.4)" text-anchor="end">calcphi.com</text>
</svg>
